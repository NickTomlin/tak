name: Release

on:
  workflow_dispatch:
    inputs:
      increment:
        description: "Version increment (patch / minor / major)"
        required: false
        default: ""

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for changelog generation

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # NPM_TOKEN must be an "Automation" token (npmjs.com → Access Tokens →
          # Generate New Token → Automation). Automation tokens bypass OTP/2FA
          # for CI publishing without disabling 2FA on your account.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          npx release-it ${{ github.event.inputs.increment }} --ci
